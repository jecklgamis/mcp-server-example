replicaCount: 1

image:
  repository: jecklgamis/mcp-server-example
  pullPolicy: Always
  tag: "main"

imagePullSecrets:
  - name: dockerhub
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: { }
  name: ""

podAnnotations: { }

podSecurityContext: { }

securityContext: { }

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
  hosts:
    - host: mcp-server-example.jecklgamis.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: mcp-server-example
      hosts:
        - mcp-server-example.jecklgamis.com

resources: { }

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: { }

tolerations: [ ]

affinity: { }
